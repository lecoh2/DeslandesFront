<div class="position-relative">
  <label class="form-label">{{ label }}</label>

  <input type="text"
         class="form-control"
         [placeholder]="placeholder"
         [formControl]="control"
         (input)="onBuscar()"
         (focus)="mostrarSugestoes = true"
         (blur)="ocultarComDelay()" />

  <!-- Sugestões -->
  <ul *ngIf="mostrarSugestoes && resultados.length > 0"
      class="list-group position-absolute w-100 shadow-sm mt-1">

    <li *ngFor="let p of resultados"
        class="list-group-item"
        (mousedown)="selecionar(p)">
      {{ p.nome }} - Documento: {{ p.documento }}
    </li>
  </ul>

  <!-- Selecionados -->
  <div *ngIf="selecionadas.length > 0" class="mt-3">
    <h6 class="text-muted">Selecionados:</h6>

    <ul class="list-unstyled">
      <li *ngFor="let p of selecionadas"
          class="d-flex align-items-center justify-content-between mb-2 p-2 border rounded">

        <div>
          <strong>{{ p.nome }}</strong><br />
          <small class="text-muted">Documento: {{ p.documento }}</small>
        </div>

        <select [(ngModel)]="p.idQualificacao"
                class="form-select form-select-sm ms-2"
                style="min-width: 160px;">
          <option [ngValue]="null">Qualificação</option>
          <option *ngFor="let q of qualificacoes"
                  [ngValue]="q.idQualificacao">
            {{ q.nomeQualificacao }}
          </option>
        </select>

        <button type="button"
                class="btn btn-sm btn-light ms-2"
                (click)="remover(p)">
          🗑
        </button>

      </li>
    </ul>
  </div>
</div>


<div class="container-fluid p-0">

  <h1 class="h3 mb-3">Cadastrar Tarefa</h1>

  <div class="card">
    <div class="card-header">
      <h5 class="card-title">Nova Tarefa</h5>
      <h6 class="card-subtitle text-muted">Preencha os dados</h6>
    </div>

    <div class="card-body">

      <app-spinner *ngIf="carregando" [show]="true"></app-spinner>

      <app-alerts *ngIf="mensagemSucesso.length" tipo="success" [mensagens]="mensagemSucesso"></app-alerts>
      <app-alerts *ngIf="mensagemErro.length" tipo="danger" [mensagens]="mensagemErro"></app-alerts>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <!-- DESCRIÇÃO -->
        <div class="mb-3">
          <label class="form-label">Descrição *</label>
          <textarea class="form-control" formControlName="descricao"></textarea>
        </div>

        <!-- DATA -->
        <div class="mb-3">
          <label class="form-label">Data da tarefa</label>
          <input type="date" class="form-control" formControlName="dataTarefa">
        </div>

        <!-- RESPONSÁVEL -->
        <div class="mb-3">
          <label class="form-label">Responsável *</label>
          <select class="form-select" formControlName="responsavelId">
            <option [ngValue]="null">Selecione</option>
            <option *ngFor="let p of pessoasFiltradas" [ngValue]="p.id">
              {{ p.nome }}
            </option>
          </select>
        </div>

        <!-- ENVOLVIDOS -->
        <div class="mb-3">
          <app-autocomplete-pessoa
            label="Envolvidos"
            [resultados]="pessoasFiltradas"
            [(selecionadas)]="envolvidosSelecionados"
            (buscar)="buscarPessoas($event)">
          </app-autocomplete-pessoa>
        </div>
<select class="form-select" [(ngModel)]="statusSelecionado">
  <option [ngValue]="StatusGeralKanban.A_Fazer">A Fazer</option>
  <option [ngValue]="StatusGeralKanban.Em_Andamento">Em Andamento</option>
  <option [ngValue]="StatusGeralKanban.Concluido">Concluído</option>
  <option [ngValue]="StatusGeralKanban.Cancelado">Cancelado</option>
</select>
        <!-- PRIORIDADE -->
      <select class="form-select" [(ngModel)]="prioridadeSelecionada">
  <option [ngValue]="PrioridadeTarefa.Baixa">Baixa</option>
  <option [ngValue]="PrioridadeTarefa.Media">Média</option>
  <option [ngValue]="PrioridadeTarefa.Alta">Alta</option>
  <option [ngValue]="PrioridadeTarefa.Urgente">Urgente</option>
</select>
<select class="form-select" [(ngModel)]="tipoVinculoSelecionado">
  <option [ngValue]="TipoVinculo.Processo">Processo</option>
  <option [ngValue]="TipoVinculo.Caso">Caso</option>
  <option [ngValue]="TipoVinculo.Atendimento">Atendimento</option>
</select>
        <!-- STATUS -->
        <div class="mb-3">
          <label class="form-label">Status</label>
          <select class="form-select" formControlName="statusGeralKanban">
            <option [ngValue]="statusEnum.AFazer">A Fazer</option>
            <option [ngValue]="statusEnum.EmAndamento">Em Andamento</option>
            <option [ngValue]="statusEnum.Concluido">Concluído</option>
            <option [ngValue]="statusEnum.Cancelado">Cancelado</option>
          </select>
        </div>

        <!-- ETIQUETAS -->
        <div class="mb-3">
          <label class="form-label">Etiquetas</label>
          <app-etiquetas
            [etiquetas]="etiquetas"
            [(selecionadas)]="etiquetasSelecionadas">
          </app-etiquetas>
        </div>

        <!-- BOTÃO -->
        <button class="btn btn-primary" [disabled]="carregando">
          <i class="fas fa-save"></i> Salvar Tarefa
        </button>

      </form>
    </div>
  </div>
</div>

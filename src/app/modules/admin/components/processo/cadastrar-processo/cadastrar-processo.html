<div class="container-fluid p-0">
  <h1 class="h3 mb-3">Cadastrar Processo</h1>

  <div class="card">
    <div class="card-header">
      <h5 class="card-title">Cadastro de Processo</h5>
      <h6 class="card-subtitle text-muted">Preencha os dados do processo</h6>
    </div>

    <div class="card-body">

      <!-- SPINNER / ALERTAS -->
      <app-spinner *ngIf="carregando" [show]="true" message="Salvando..."></app-spinner>

      <app-alerts *ngIf="!carregando && mensagemSucesso.length"
                  titulo="Sucesso!"
                  [mensagens]="mensagemSucesso"
                  tipo="success">
      </app-alerts>

      <app-alerts *ngIf="!carregando && mensagemErro.length"
                  titulo="Erro!"
                  [mensagens]="mensagemErro"
                  tipo="danger">
      </app-alerts>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <!-- ================= DADOS DO PROCESSO ================= -->
        <h5 class="mb-3">Dados do Processo</h5>

        <div class="row mb-3">
          <div class="col-md-4">
            <label class="form-label">Pasta *</label>
            <input class="form-control" formControlName="pasta">
          </div>

          <div class="col-md-4">
            <label class="form-label">Título *</label>
            <input class="form-control" formControlName="titulo">
          </div>

          <div class="col-md-4">
            <label class="form-label">Número do Processo *</label>
            <input class="form-control" formControlName="numeroProcesso">
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-4">
            <label class="form-label">Vara *</label>
            <select class="form-control" formControlName="varaId">
              <option [ngValue]="null">Selecione</option>
              <option *ngFor="let vara of varas" [ngValue]="vara.id">
                {{ vara.nomeVara }}
              </option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Ação</label>
            <select class="form-control" formControlName="acaoId">
              <option [ngValue]="null">Selecione</option>
              <option *ngFor="let acao of acoes" [ngValue]="acao.id">
                {{ acao.NomeAcao }}
              </option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Responsável</label>
            <select class="form-control" formControlName="usuarioResponsavelId">
              <option [ngValue]="null">Selecione</option>
              <option *ngFor="let user of responsaveis" [ngValue]="user.idUsuario">
                {{ user.nomeUsuario }}
              </option>
            </select>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Link do Tribunal</label>
          <input class="form-control" formControlName="linkTribunal">
        </div>

        <div class="mb-3">
          <label class="form-label">Objeto</label>
          <textarea class="form-control" rows="3" formControlName="objeto"></textarea>
        </div>

        <!-- ================= VALORES ================= -->
        <h5 class="mt-4 mb-3">Valores e Datas</h5>

        <div class="row mb-3">
          <div class="col-md-4">
            <label class="form-label">Valor da Causa</label>
            <input type="number" class="form-control" formControlName="valorCausa">
          </div>

          <div class="col-md-4">
            <label class="form-label">Valor da Condenação</label>
            <input type="number" class="form-control" formControlName="valorCondenacao">
          </div>

          <div class="col-md-4">
            <label class="form-label">Data de Distribuição</label>
            <input type="date" class="form-control" formControlName="distribuido">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Observação</label>
          <textarea class="form-control" rows="3" formControlName="observacao"></textarea>
        </div>

        <!-- ================= RELACIONAMENTOS ================= -->
        <h5 class="mt-4 mb-3">Relacionamentos</h5>

        <!-- CLIENTES -->
        <div class="mb-3">
          <label class="form-label">Clientes</label>

          <div class="col-md-4 position-relative">
            <label class="form-label">Cliente(s)</label>

            <input type="text"
                   class="form-control"
                   placeholder="Digite o nome"
                   autocomplete="off"
                   [formControl]="pessoaNomeControl"
                   (focus)="mostrarSugestoesPessoa = true"
                   (blur)="ocultarSugestoesComDelay()" />

            <!-- Sugestões -->
            <ul *ngIf="mostrarSugestoesPessoa && pessoasFiltradas.length > 0"
                class="list-group position-absolute w-100 shadow-sm mt-1">
              <li *ngFor="let pessoa of pessoasFiltradas"
                  class="list-group-item d-flex justify-content-between align-items-center"
                  (mousedown)="selecionarPessoa(pessoa)">
                {{ pessoa.nome }} - Documento: {{ pessoa.documento }}
              </li>
            </ul>

            <!-- Selecionadas -->
            <div *ngIf="pessoasSelecionadas.length > 0" class="mt-3">
              <h6 class="text-muted">Pessoas selecionadas:</h6>

              <ul class="list-unstyled">
                <li *ngFor="let p of pessoasSelecionadas"
                    class="d-flex align-items-center justify-content-between mb-2 p-2 border rounded">

                  <div>
                    <strong>{{ p.nome }}</strong><br />
                    <small class="text-muted">Documento: {{ p.documento }}</small>
                  </div>

                  <select [(ngModel)]="p.idQualificacao"
                          class="form-select form-select-sm ms-2"
                          style="min-width: 160px;">
                    <option [ngValue]="null">Qualificação</option>
                    <option *ngFor="let q of qualificacoes"
                            [ngValue]="q.idQualificacao">
                      {{ q.nomeQualificacao }}
                    </option>
                  </select>

                  <button type="button"
                          class="btn btn-sm btn-light ms-2"
                          (click)="removerPessoaSelecionada(p)">
                    🗑
                  </button>

                </li>
              </ul>
            </div>
          </div>
        </div>

        <!-- ETIQUETAS -->
        <div class="mb-3">
          <label class="form-label">Etiquetas</label>

          <app-etiquetas
            [etiquetas]="tiposetiquetas"
            [(selecionadas)]="etiquetasSelecionadas">
          </app-etiquetas>
        </div>

        <!-- BOTÃO -->
        <button type="submit" class="btn btn-primary mt-3" [disabled]="carregando">
          <i class="fas fa-save"></i> Salvar Processo
        </button>

      </form>

    </div>
  </div>
</div>

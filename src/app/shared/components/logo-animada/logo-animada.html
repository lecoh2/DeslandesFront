<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo CNPI Zoom</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  img.logo {
    width: 114px;
    height: 112px;
    display: block;
    margin: 0;       /* remove qualquer margem */
    padding: 0;      /* remove qualquer padding */
    transform: scale(0.5) rotate(-10deg);
    opacity: 0;
    animation: zoomRotate 1.5s ease-out forwards;
  }

  @keyframes zoomRotate {
    0% {
      transform: scale(0.5) rotate(-10deg);
      opacity: 0;
    }
    50% {
      transform: scale(1.1) rotate(3deg);
      opacity: 1;
    }
    100% {
      transform: scale(1) rotate(0deg);
      opacity: 1;
    }
  }
</style>
</head>
<body>

<img src="assets/appprocon/img/photos/cnpi_icon.png" alt="Logo CNPI" class="logo">

</body>
</html>
